<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h2 class="title">Bem-vindo 👋</h2>

        <p class="subtitle">
            Você está logado com sucesso
        </p>

        <div class="info-box">
            <p><strong>Email:</strong></p>
            <p id="userEmail" data-testid="user-email"></p>
        </div>

        <button
            data-testid="logout-button"
            onclick="logout()"
        >
            Logout
        </button>

    </div>

</div>

<script>
    const user = localStorage.getItem("user");

    // proteção de rota
    if (!user) {
        window.location.href = "/";
    }

    // exibe usuário
    document.getElementById("userEmail").innerText = user;

    // logout explícito
    function logout() {
        localStorage.removeItem("user");

        // garante retorno para login
        window.location.href = "/";
    }
</script>

</body>
</html>
